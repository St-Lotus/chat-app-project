<!DOCTYPE html>
<html>
<head>
    <title>St. Lotus Chat</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --primary: #075e54; --light: #dcf8c6; }
        body { font-family: 'Segoe UI', sans-serif; background: #e5ddd5; margin: 0; display: flex; height: 100vh; }
        .sidebar { width: 200px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
        .sidebar-header { padding: 15px; background: #eee; font-weight: bold; font-size: 14px; }
        #user-list { list-style: none; padding: 0; margin: 0; flex: 1; overflow-y: auto; }
        #user-list li { padding: 10px 15px; border-bottom: 1px solid #f0f0f0; font-size: 13px; color: #333; }
        #user-list li::before { content: "● "; color: #4CAF50; }
        .main-chat { flex: 1; display: flex; flex-direction: column; background: white; max-width: 600px; margin: auto; height: 100vh; position: relative; }
        .header { background: var(--primary); color: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; }
        .logout-btn { color: #ffbcbc; text-decoration: none; font-size: 13px; }
        #chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        .msg { padding: 6px 10px; border-radius: 8px; max-width: 80%; font-size: 14px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .sent { background: var(--light); align-self: flex-end; }
        .received { background: white; align-self: flex-start; }
        .time { font-size: 10px; color: #888; margin-top: 4px; display: block; text-align: right; }
        .input-area { padding: 10px; background: #f0f0f0; border-top: 1px solid #ddd; }
        .emoji-bar { padding: 5px; display: flex; gap: 10px; font-size: 18px; cursor: pointer; }
        .controls { display: flex; gap: 10px; align-items: center; }
        input[type="text"] { flex: 1; padding: 12px; border-radius: 20px; border: 1px solid #ddd; outline: none; }
        .attach-btn { font-size: 22px; cursor: pointer; color: #555; }
        .img-preview { max-width: 100%; border-radius: 5px; margin-top: 5px; cursor: pointer; }
        @media (max-width: 600px) { .sidebar { display: none; } }
        .online-dot {
            height: 10px;
            width: 10px;
            background-color: #4CAF50;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }
        .online-user-item {
            padding: 10px;
            border-bottom: 1px solid #eee;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h3>Online Users</h3>
        <div id="user-list"></div>
    </div>
    <div class="main-chat">
        <div class="header">
            <span>{{ user.username }}</span>
            <a href="/logout" class="logout-btn">Logout</a>
        </div>
        <div id="chat"></div>
        <div class="input-area">
            <div class="emoji-bar">
                <span onclick="addEmoji('😊')">😊</span><span onclick="addEmoji('😂')">😂</span>
                <span onclick="addEmoji('❤️')">❤️</span><span onclick="addEmoji('👍')">👍</span>
                <span onclick="addEmoji('🙏')">🙏</span><span onclick="addEmoji('😮')">😮</span>
            </div>
            <div class="controls">
                <label class="attach-btn">📎<input type="file" id="fileInput" style="display:none" onchange="uploadFile()"></label>
                <input id="message" type="text" placeholder="Type a message..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()" style="border:none; background:none; font-size:24px; cursor:pointer; color:var(--primary);">➤</button>
            </div>
        </div>
    </div>

    <script>
        var socket = io();
        var myName = "{{ user.username }}";

        socket.on('user_list', function(users) {
            document.getElementById('user-list').innerHTML = users.map(u => `<li>${u}</li>`).join('');
        });

        socket.on('update_users', function(users) {
            const userList = document.getElementById('user-list'); // online user ပြမယ့် div id
            userList.innerHTML = ''; // အဟောင်းတွေကို ရှင်းမယ်
    
            users.forEach(function(username) {
            const div = document.createElement('div');
                div.className = 'online-user-item'; // CSS ပုံစံသွင်းဖို့ class
                div.innerHTML = `<span class="online-dot"></span> ${username}`;
                userList.appendChild(div);
            });
        });
        socket.on('message', function(data) {
            var chat = document.getElementById('chat');
            var div = document.createElement('div');
            div.className = 'msg ' + (data.user === myName ? 'sent' : 'received');
            
            let content = `<div style="font-weight:bold; font-size:11px; color:#555">${data.user}</div>`;
            
            if (data.type === 'file') {
                const ext = data.filename.split('.').pop().toLowerCase();
                if (['jpg', 'jpeg', 'png', 'gif'].includes(ext)) {
                    content += `<img src="${data.message}" class="img-preview" onclick="window.open(this.src)">`;
                } else {
                    content += `<a href="${data.message}" target="_blank" style="color:#075e54; text-decoration:none;">📄 ${data.filename}</a>`;
                }
            } else {
                content += `<div>${data.message}</div>`;
            }
            
            content += `<span class="time">${data.time || ''}</span>`;
            div.innerHTML = content;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        });

        function sendMessage() {
            var input = document.getElementById('message');
            if(input.value.trim()) {
                socket.emit('message', {message: input.value});
                input.value = '';
            }
        }

        function addEmoji(emoji) {
            document.getElementById('message').value += emoji;
        }

        function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
    
            if (file) {
                // ဖိုင်ဆိုဒ် 5MB ထက်ကြီးရင် မပို့အောင် ကန့်သတ်တာပိုကောင်းပါတယ်
                if (file.size > 5 * 1024 * 1024) {
                    alert("ဖိုင်ဆိုဒ် အရမ်းကြီးနေပါတယ် (5MB အထိပဲ ရပါတယ်)");
                    return;
        }

            const reader = new FileReader();
            reader.onload = function(e) {
                const rawData = e.target.result;
                // Socket ကနေ ပုံဒေတာကို လှမ်းပို့မယ်
                socket.emit('file_upload', {
                    filename: file.name,
                    content: rawData
                });
                // ပို့ပြီးရင် input ကို ပြန်ရှင်းမယ်
                fileInput.value = '';
            };
            reader.readAsDataURL(file);
        }
        socket.on('update_users', function(users) {
            const userList = document.getElementById('user-list'); // online user ပြမယ့် div id
            userList.innerHTML = ''; // အဟောင်းတွေကို ရှင်းမယ်
    
            users.forEach(function(username) {
                const div = document.createElement('div');
                div.className = 'online-user-item'; // CSS ပုံစံသွင်းဖို့ class
                div.innerHTML = `<span class="online-dot"></span> ${username}`;
                userList.appendChild(div);
            });
        });    
    }
    </script>
</body>
</html>
