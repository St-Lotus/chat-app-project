<div style="max-width: 300px; margin: 100px auto; text-align: center;">
    <h2>Register</h2>
    <form method="POST">
        <input name="phone" placeholder="Phone Number" required style="width:100%; margin-bottom:10px; padding:10px;"><br>
        <input name="username" placeholder="User Name" required style="width:100%; margin-bottom:10px; padding:10px;"><br>
        <button type="submit" style="width:100%; padding:10px; background:#075e54; color:white; border:none;">Create Account</button>
    </form>
    <a href="/login">Already have an account? Login</a>
</div>
